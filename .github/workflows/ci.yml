name: PAAX AI CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint-and-typecheck-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Typecheck
        run: pnpm run typecheck --if-present
      - name: Lint
        run: pnpm run lint --if-present

  lint-and-test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff pytest
      - name: Install Core Engine dependencies
        working-directory: ./apps/core-engine
        run: pip install -r requirements.txt || true
      - name: Lint Python (Ruff)
        run: ruff check .
      - name: Run Python Tests
        working-directory: ./apps/core-engine
        run: pytest || echo "No tests configured yet"

  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck-ts
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Build Next.js App
        working-directory: ./apps/frontend
        run: pnpm run build --if-present
